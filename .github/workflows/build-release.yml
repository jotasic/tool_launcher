name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Tag is the source of truth: set package.json version from the release tag
      # (v1.2.0 -> 1.2.0) so you never hand-edit the version and the installers
      # attach to the exact release you published.
      - name: Set version from release tag
        shell: bash
        run: npm version --no-git-tag-version --allow-same-version "${TAG#v}"
        env:
          TAG: ${{ github.event.release.tag_name }}
      - name: Build and publish
        run: |
          npm run build
          npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
